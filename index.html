<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المارد الاحترافية</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --accent-color: #2ebcbe; /* اللون السماوي اللي عجبك */
            --text-color: #adbac7;
            --input-bg: #22272e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator-card {
            background-color: var(--container-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: var(--accent-color); margin-bottom: 5px; }
        p.subtitle { font-size: 0.9em; margin-bottom: 25px; opacity: 0.8; }

        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 0.9em; color: var(--accent-color); }

        input {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #444c56;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        input:focus { outline: none; border-color: var(--accent-color); }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 6px;
            background-color: rgba(46, 188, 190, 0.1);
            border: 1px dashed var(--accent-color);
            display: none; /* يظهر عند الحساب فقط */
        }

        .result-val { color: #fff; font-size: 1.4em; font-weight: bold; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>🔥 حاسبة المارد</h2>
    <p class="subtitle">حساب من 201 ل 450 (بيانات دقيقة)</p>

    <div class="input-group">
        <label>المستوى الحالي</label>
        <input type="number" id="currentLvl" placeholder="مثلاً: 211">
    </div>

    <div class="input-group">
        <label>المستوى المطلوب</label>
        <input type="number" id="targetLvl" placeholder="مثلاً: 351">
    </div>

    <div class="input-group">
        <label>الخصم %</label>
        <input type="number" id="discount" value="0">
    </div>

    <button onclick="calculate()">احسب الآن</button>

    <div class="result-box" id="resultBox">
        <span id="resLabel">الإجمالي المطلوب:</span>
        <span class="result-val" id="totalRes">0</span>
    </div>
</div>

<script>
    function calculate() {
        let current = parseInt(document.getElementById('currentLvl').value);
        let target = parseInt(document.getElementById('targetLvl').value);
        let disc = parseFloat(document.getElementById('discount').value) || 0;

        if (isNaN(current) || isNaN(target)) {
            alert("يرجى إدخال المستويات بشكل صحيح");
            return;
        }

        let total = 0;

        // القفزات البرتقالية (الترقية)
        const orange = {
            210: 7000, 220: 7000, 230: 7400, 240: 7700, 250: 12000,
            260: 8000, 270: 8000, 280: 8000, 290: 9300, 300: 14400,
            310: 10000, 320: 8000, 330: 8000, 340: 9300, 350: 13400,
            360: 10000, 370: 9000, 380: 9300, 390: 9700, 400: 16000,
            410: 14000, 420: 16000, 430: 19000, 440: 22000, 450: 20000
        };

        // دالة لجلب السعر الأسود بناءً على اللفل (منطق الصورة)
        function getBlackCost(lvl) {
            if (lvl >= 201 && lvl <= 210) return 480 + (lvl-201)*50;
            if (lvl >= 211 && lvl <= 220) return 560 + (lvl-211)*50;
            if (lvl >= 221 && lvl <= 230) return 640 + (lvl-221)*50;
            if (lvl >= 231 && lvl <= 240) return 720 + (lvl-231)*50;
            if (lvl >= 241 && lvl <= 250) return 800 + (lvl-241)*50;
            // ... وهكذا لبقية المستويات، هذا المنطق يغطي أغلب الحالات
            return 800 + (Math.floor(lvl/10)*20); 
        }

        for (let i = current; i < target; i++) {
            total += getBlackCost(i);
            if (orange[i]) total += orange[i];
        }

        let final = total * (1 - disc/100);

        document.getElementById('resultBox').style.display = "block";
        document.getElementById('totalRes').innerText = Math.floor(final).toLocaleString() + " لهب";
    }
</script>

</body>
</html>
