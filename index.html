<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة تطوير ختم النسر الذكية</title>
    <style>
        :root {
            --gold: #f1c40f;
            --orange: #f39c12;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .calculator-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #333;
        }
        h1 { text-align: center; color: var(--gold); font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; }
        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            outline: none;
        }
        select:focus { border-color: var(--gold); }
        .result-area {
            margin-top: 25px;
            padding: 20px;
            background: #252525;
            border-radius: 15px;
            border-right: 5px solid var(--gold);
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .price { font-weight: bold; color: #2ecc71; }
        .pieces-count { color: var(--orange); font-weight: bold; }
    </style>
</head>
<body>

<div class="calculator-card">
    <h1>🦅 حاسبة ختم النسر</h1>
    
    <div class="input-group">
        <label>نوع الختم (الفئة):</label>
        <select id="sealType" onchange="calculate()">
            <option value="20">ختم برتقالي (20$)</option>
            <option value="30">ختم برتقالي+ (30$)</option>
            <option value="50">ختم ذهبي (50$)</option>
        </select>
    </div>

    <div class="input-group">
        <label>المستوى الحالي لديك:</label>
        <select id="currentLevel" onchange="calculate()">
            <option value="0">مستوى 0</option>
            <option value="1">مستوى 10</option>
            <option value="2">مستوى 20</option>
            <option value="3">مستوى 25</option>
            <option value="4">مستوى 30</option>
            <option value="5">مستوى 35</option>
            <option value="6">مستوى 40</option>
            <option value="7">مستوى 45</option>
            <option value="8">مستوى 50</option>
        </select>
    </div>

    <div class="input-group">
        <label>المستوى الذي تريد الوصول إليه:</label>
        <select id="targetLevel" onchange="calculate()">
            <option value="1">مستوى 10</option>
            <option value="2">مستوى 20</option>
            <option value="3">مستوى 25</option>
            <option value="4">مستوى 30</option>
            <option value="5">مستوى 35</option>
            <option value="6">مستوى 40</option>
            <option value="7">مستوى 45</option>
            <option value="8" selected>مستوى 50</option>
        </select>
    </div>

    <div class="result-area">
        <div class="result-item">
            <span>القطع المطلوبة:</span>
            <span class="pieces-count" id="neededPieces">0</span>
        </div>
        <div class="result-item" style="border-top: 1px solid #444; pt-10px; margin-top: 10px;">
            <span>التكلفة الإجمالية:</span>
            <span class="price" id="totalCost">0$</span>
        </div>
    </div>
</div>

<script>
    // مصفوفة تمثل القطع المطلوبة لكل نقلة بالترتيب
    // [0-10, 10-20, 20-25, 25-30, 30-35, 35-40, 40-45, 45-50]
    const pieceSteps = [1, 1, 3, 5, 8, 11, 14, 18];

    function calculate() {
        const currentIdx = parseInt(document.getElementById('currentLevel').value);
        const targetIdx = parseInt(document.getElementById('targetLevel').value);
        const pricePerPiece = parseInt(document.getElementById('sealType').value);
        
        let totalPieces = 0;

        if (targetIdx > currentIdx) {
            // حساب مجموع القطع بين المستويين المختاريين
            for (let i = currentIdx; i < targetIdx; i++) {
                totalPieces += pieceSteps[i];
            }
        } else {
            totalPieces = 0; // إذا كان المختار أقل من الحالي
        }

        const totalCost = totalPieces * pricePerPiece;

        // تحديث الواجهة
        document.getElementById('neededPieces').innerText = totalPieces + " قطعة";
        document.getElementById('totalCost').innerText = totalCost + "$";
    }

    // تشغيل الحسبة عند أول تحميل للملف
    calculate();
</script>

</body>
</html>
