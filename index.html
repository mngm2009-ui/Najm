<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>حاسبة المارد</title>
    <style>
        body { background-color: #121212; color: #00f2ff; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { border: 2px solid #00f2ff; border-radius: 15px; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background-color: #00f2ff; color: #121212; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; font-size: 1.2em; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔥 حاسبة المارد</h2>
        <p>من 201 ل 450 من دون خصم</p>
        <input type="number" id="currentLvl" placeholder="المستوى الحالي">
        <input type="number" id="targetLvl" placeholder="المستوى المطلوب">
        <button onclick="calculate()">احسب الآن</button>
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            let current = parseInt(document.getElementById('currentLvl').value);
            let target = parseInt(document.getElementById('targetLvl').value);
            let total = 0;

            // بيانات الترقية البرتقالية
            const orange = {
                210: 7000, 220: 7000, 230: 7400, 240: 7700, 250: 12000,
                260: 8000, 270: 8000, 280: 8000, 290: 9300, 300: 14400,
                310: 10000, 320: 8000, 330: 8000, 340: 9300, 350: 13400,
                360: 10000, 370: 9000, 380: 9300, 390: 9700, 400: 16000,
                410: 14000, 420: 16000, 430: 19000, 440: 22000, 450: 20000
            };

            // حساب التكلفة السوداء (تبسيط للمنطق)
            for (let i = current; i < target; i++) {
                // هنا يوضع منطق الحساب الأسود الذي استخرجناه من الجدول
                let black = 500 + (Math.floor((i-201)/10) * 100); // تقريبي للتبسيط
                total += black;
                if (orange[i]) total += orange[i];
            }

            document.getElementById('result').innerHTML = "الإجمالي: " + total.toLocaleString() + " لهب";
        }
    </script>
</body>
</html>
